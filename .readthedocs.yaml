# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Install the package together with its [docs] optional dependencies.
# All Sphinx extensions are declared in pyproject.toml — no separate
# requirements file needed.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
  builder: html
  fail_on_warning: false
